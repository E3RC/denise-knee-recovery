services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.rewrite
    restart: unless-stopped
    ports:
      - "${REWRITE_BIND:-0.0.0.0}:${REWRITE_HOST_PORT:-8091}:8080"
    environment:
      DB_PATH: /app/data/recovery.sqlite
      CAREGIVER_PIN: ${CAREGIVER_PIN:?CAREGIVER_PIN is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      RECOVERY_TIMEZONE: ${RECOVERY_TIMEZONE:-America/New_York}
      SESSION_SECURE: ${SESSION_SECURE:-1}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      PUSHOVER_USER_KEY: ${PUSHOVER_USER_KEY:-}
      PUSHOVER_APP_TOKEN: ${PUSHOVER_APP_TOKEN:-}
    volumes:
      - ./data:/app/data

  reminders:
    profiles: ["reminders"]
    build:
      context: .
      dockerfile: Dockerfile.rewrite
    restart: unless-stopped
    command: ["python", "-m", "app.reminder_worker"]
    environment:
      DB_PATH: /app/data/recovery.sqlite
      RECOVERY_TIMEZONE: ${RECOVERY_TIMEZONE:-America/New_York}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      PUSHOVER_USER_KEY: ${PUSHOVER_USER_KEY:-}
      PUSHOVER_APP_TOKEN: ${PUSHOVER_APP_TOKEN:-}
    volumes:
      - ./data:/app/data
