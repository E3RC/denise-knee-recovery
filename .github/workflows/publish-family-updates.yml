name: Publish family updates

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-family-updates.yml"
      - "scripts/sync_family_updates.py"

permissions:
  contents: write

jobs:
  publish-family-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Build family update JSON from Google Sheet
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          FAMILY_UPDATES_RANGE: "'Family Updates'!A:J"
        run: python scripts/sync_family_updates.py

      - name: Commit update if changed
        run: |
          if git diff --quiet -- docs/family-updates.json; then
            echo "No family update changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/family-updates.json
          git commit -m "Publish latest family updates"
          git push
