services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DB_PATH: /app/data/recovery.sqlite
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      CAREGIVER_PIN: ${CAREGIVER_PIN:-}
    volumes:
      - ./data:/app/data
