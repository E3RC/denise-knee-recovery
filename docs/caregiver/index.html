<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Knee'd to Know | Caregiver Sign-in</title>
  <link rel="icon" href="/icon.svg" />
  <style>
    :root {
      color-scheme: light;
      --bg-top: #f5f8f8;
      --bg-bottom: #e6efee;
      --panel: rgba(255, 255, 255, 0.92);
      --text: #173039;
      --muted: #627780;
      --line: rgba(37, 83, 89, 0.12);
      --accent: #0b6b68;
      --accent-strong: #074c53;
      --shadow: 0 26px 60px rgba(20, 47, 56, 0.14);
      --radius-xl: 30px;
      --radius-lg: 20px;
    }
    * { box-sizing: border-box; }
    html {
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(150, 204, 197, 0.38), transparent 24rem),
        radial-gradient(circle at top right, rgba(190, 225, 220, 0.6), transparent 30rem),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--text);
      padding: 18px 14px;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.45) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.35) 1px, transparent 1px);
      background-size: 26px 26px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.14), transparent 60%);
      opacity: 0.28;
    }
    .card {
      position: relative;
      width: min(460px, 100%);
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      padding: 26px 20px 22px;
    }
    .card::before {
      content: "";
      position: absolute;
      top: -3rem;
      right: -2rem;
      width: 11rem;
      height: 11rem;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(11, 107, 104, 0.16), transparent 68%);
      pointer-events: none;
    }
    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }
    .brand-logo {
      width: 68px;
      height: 68px;
      border-radius: 18px;
      box-shadow: 0 14px 30px rgba(11, 68, 77, 0.16);
      flex: 0 0 auto;
    }
    .eyebrow {
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: .75rem;
      font-weight: 800;
      color: var(--accent);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.2rem, 10vw, 3.35rem);
      line-height: .95;
      letter-spacing: -0.04em;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
      position: relative;
      z-index: 1;
    }
    label {
      display: grid;
      gap: 8px;
      font-weight: 650;
      margin-top: 12px;
    }
    input, button {
      font: inherit;
      width: 100%;
      min-height: 54px;
      border-radius: 15px;
    }
    input {
      border: 1px solid var(--line);
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--text);
    }
    button {
      margin-top: 16px;
      border: 0;
      background: linear-gradient(135deg, var(--accent-strong) 0%, var(--accent) 100%);
      color: #fff;
      font-weight: 750;
      box-shadow: 0 12px 24px rgba(11, 107, 104, 0.24);
    }
    .note {
      margin-top: 16px;
      font-size: .92rem;
      color: var(--muted);
    }
    .error {
      color: #b42318;
      min-height: 1.4em;
      margin-top: 10px;
      font-weight: 650;
    }
    @media (min-width: 760px) {
      .card {
        padding: 30px 28px 24px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand-row">
      <img src="/icon.svg" alt="Knee'd to Know logo" class="brand-logo" />
      <div>
        <p class="eyebrow">Private caregiver access</p>
        <h1>Knee'd to Know</h1>
      </div>
    </div>
    <p>The family page stays public. The recovery dashboard stays behind Brent's caregiver PIN.</p>
    <form id="login-form">
      <label for="pin">Caregiver PIN</label>
      <input id="pin" name="pin" type="password" inputmode="numeric" autocomplete="current-password" required />
      <button type="submit">Open caregiver dashboard</button>
      <div id="error" class="error" aria-live="polite"></div>
    </form>
    <p class="note">This page does not publish medication details or private notes.</p>
  </main>
  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error');

    form.addEventListener('submit', async event => {
      event.preventDefault();
      errorEl.textContent = '';

      const pin = document.getElementById('pin').value.trim();
      if (!pin) {
        errorEl.textContent = 'Enter the caregiver PIN.';
        return;
      }

      try {
        const response = await fetch('/api/caregiver-session', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ pin })
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          errorEl.textContent = payload.error || 'Sign-in failed.';
          return;
        }

        window.location.href = payload.redirectTo || '/dashboard';
      } catch {
        errorEl.textContent = 'Sign-in is temporarily unavailable.';
      }
    });
  </script>
</body>
</html>
