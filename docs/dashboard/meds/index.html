<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Knee'd to Know | Medications</title>
  <meta name="theme-color" content="#0f766e" />
  <link rel="icon" href="/dashboard/icon.svg" />
  <link rel="stylesheet" href="/dashboard/meds/meds.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand-row">
        <img src="/dashboard/icon.svg" alt="Logo" class="brand-logo" />
        <div>
          <p class="eyebrow">Medications</p>
          <h1>Knee'd to Know</h1>
        </div>
      </div>
      <nav class="tabs">
        <a class="tab" href="/dashboard">Overview</a>
        <a class="tab active" href="/dashboard/meds/">Meds</a>
        <a class="tab" href="/patient">Patient</a>
      </nav>
    </header>

    <div class="med-list" id="med-list"></div>

    <button id="add-med-btn" class="add-btn">+ Add medication</button>
  </main>

  <!-- Hidden template for edit dialog -->
  <div class="overlay" id="edit-overlay" style="display:none">
    <div class="sheet" id="edit-sheet">
      <div class="sheet-head">
        <h2 id="edit-title">Edit</h2>
        <button id="edit-close" class="ghost">&times;</button>
      </div>
      <div class="sheet-body" id="edit-body"></div>
      <div class="sheet-foot">
        <button id="edit-save" class="primary">Save</button>
      </div>
    </div>
  </div>

  <script src="/dashboard/meds/meds.js"></script>
</body>
</html>
