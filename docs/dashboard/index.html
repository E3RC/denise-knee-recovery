<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Knee'd to Know | Caregiver Dashboard</title>
  <meta name="theme-color" content="#0f766e" />
  <link rel="icon" href="/dashboard/icon.svg" />
  <link rel="manifest" href="/dashboard/manifest.webmanifest" />
  <link rel="stylesheet" href="/dashboard/dashboard.css" />
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="brand-row">
        <img src="/dashboard/icon.svg" alt="Knee'd to Know logo" class="brand-logo" />
        <div>
          <p class="eyebrow">Caregiver dashboard</p>
          <h1>Knee'd to Know</h1>
        </div>
      </div>
      <div class="hero-grid">
        <div class="hero-card">
          <span class="label">Recovery day</span>
          <strong id="recovery-day">Day 0</strong>
        </div>
        <div class="hero-card">
          <span class="label">Countdown</span>
          <strong id="countdown">Loading...</strong>
        </div>
        <div class="hero-card">
          <span class="label">Pain</span>
          <strong id="pain-badge">--</strong>
        </div>
      </div>
      <div class="hero-actions">
        <button id="logout" class="ghost" type="button">Lock dashboard</button>
        <button id="export-json" class="ghost" type="button">Export</button>
      </div>
    </section>

    <section class="grid">
      <!-- COMMAND CENTER - always visible first -->
      <section class="card wide cmd-card">
        <div class="ai-bar-inline">
          <button id="ai-mic" class="ghost-ai" title="Voice input" type="button">&#127908;</button>
          <input type="text" id="ai-input" placeholder="Say or type what happened..." autocomplete="off" />
          <button id="ai-send" title="Send" type="button">&#8593;</button>
        </div>
        <div class="ai-confirm-inline" id="ai-confirm" style="display:none">
          <div class="summary" id="ai-summary"></div>
          <div class="actions-row">
            <button class="btn-apply" id="ai-apply">Apply</button>
            <button class="btn-cancel" id="ai-cancel">Cancel</button>
          </div>
        </div>
      </section>

      <!-- NEXT DOSE TIMERS -->
      <section class="card wide" id="next-meds-card">
        <h2>Next Meds</h2>
        <div id="next-meds-list" class="stack"></div>
      </section>

      <!-- QUICK CHECKS -->
      <section class="card wide">
        <div class="section-head">
          <h2>Quick Check</h2>
        </div>
        <div id="quick-check-grid" class="quick-check-grid"></div>
      </section>

      <!-- TODAY -->
      <section class="card wide">
        <h2>Today</h2>
        <div id="today-list" class="stack"></div>
      </section>

      <!-- MEDICATIONS collapsed -->
      <details class="card wide section-collapse">
        <summary class="section-head"><h2>Medications</h2><span class="toggle-icon">&#9660;</span></summary>
        <div id="medications-list" class="stack"></div>
      </details>

      <!-- ACTIVITY LOG collapsed -->
      <details class="card wide section-collapse">
        <summary class="section-head"><h2>Activity Log</h2><span class="toggle-icon">&#9660;</span></summary>
        <div id="activity" class="stack"></div>
      </details>

      <!-- VITALS & NOTES collapsed -->
      <details class="card wide section-collapse">
        <summary class="section-head"><h2>Vitals &amp; Notes</h2><span class="toggle-icon">&#9660;</span></summary>
        <div class="section-head">
          <h3>Latest Vitals</h3>
          <button id="add-log-entry" class="ghost" type="button">Add entry</button>
        </div>
        <div id="caregiver-log" class="caregiver-log"></div>
        <div id="notes" class="stack" style="margin-top:12px"></div>
      </details>

      <!-- EVERYTHING ELSE collapsed -->
      <details class="card wide section-collapse">
        <summary class="section-head"><h2>More</h2><span class="toggle-icon">&#9660;</span></summary>
        <div id="patient-form" class="stack"></div>
        <div id="workflow-roles" class="stack"></div>
        <div id="contacts-form" class="stack"></div>
        <div id="milestones" class="stack"></div>
        <div id="equipment" class="stack"></div>
        <div id="photo-log" class="photo-log"></div>
        <div id="checklist" class="checklist"></div>
        <div id="next-task" class="item"></div>
        <div id="follow-up-summary" class="item"></div>
      </details>

      <!-- SAFETY always at bottom -->
      <section class="card wide">
        <p class="small" style="color:var(--muted);text-align:center">Not medical advice. Use surgeon and pharmacy instructions for medication timing and dosing.</p>
      </section>
    </section>
  </main>

  <script src="/dashboard/dashboard.js"></script>
</body>
</html>
